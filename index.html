<!DOCTYPE html>
<html lang="en">
<head>
     <!-- SDKs -->
     <script src="https://telegram.org/js/telegram-web-app.js"></script>
     <script src='//libtl.com/sdk.js' data-zone='10693042' data-sdk='show_10693042'></script>
     <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
     <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
     <script>
       window.TelegramAdsController = new TelegramAdsController();
       window.TelegramAdsController.initialize({ pubId: "997172", appId: "6457" });
     </script>
     
<meta charset="UTF-8">
<title>DealFlow Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ================= AAPKA ORIGINAL LOOKS ================= */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

:root { 
    --bg: #050505; --card: rgba(255, 255, 255, 0.06); 
    --glass-border: rgba(255, 255, 255, 0.1); --text: #ffffff; 
    --muted: #94a3b8; --accent: #007AFF; --success: #22c55e;
    --gold: #FFD700; --primary-grad: linear-gradient(135deg, #007AFF, #00C6FF);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); padding-bottom: 100px; padding-top: 70px; overflow-x: hidden; }

/* LOADING */
#loadingOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOP BAR */
.topbar { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
.topbar .logo { font-size: 20px; font-weight: 800; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.balance-pill { background: var(--card); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; }

/* STORE GRID */
.store-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
.app-card { background: var(--card); border-radius: 24px; padding: 12px; border: 1px solid var(--glass-border); transition: 0.2s; position: relative; }
.app-icon { width: 100%; aspect-ratio: 1/1; border-radius: 18px; object-fit: cover; margin-bottom: 10px; }
.app-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge-game { position: absolute; top: 18px; right: 18px; background: var(--gold); color: black; font-size: 8px; padding: 2px 6px; border-radius: 6px; font-weight: 900; }

/* CATEGORY CHIPS */
.category-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
.chip { padding: 8px 18px; background: var(--card); border-radius: 12px; border: 1px solid var(--glass-border); font-size: 13px; white-space: nowrap; cursor: pointer; }
.chip.active { background: var(--accent); border-color: var(--accent); font-weight: 700; }

/* NAVIGATION */
nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; height: 70px; background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(25px); border-radius: 24px; display: flex; justify-content: space-around; align-items: center; z-index: 100; border: 1px solid var(--glass-border); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; }
.nav-item.active { color: var(--accent); }
.nav-item i { font-size: 20px; }

/* MODALS */
.fs-modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
#gamePlayer { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
.game-header { height: 60px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; }
.game-frame { flex: 1; border: none; width: 100%; height: 100%; background: white;}
</style>
</head>

<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">DEALFLOW</div>
  <div class="balance-pill">
    <i class="fa-solid fa-coins" style="color:var(--gold)"></i>
    <span id="coinDisplay">0.0000</span>
  </div>
</div>

<!-- HOME SECTION -->
<section id="home" class="page">
    <div class="category-scroll">
        <div class="chip active" onclick="filterCat('All', this)">All</div>
        <div class="chip" onclick="filterCat('Games', this)">Games</div>
        <div class="chip" onclick="filterCat('Premium Apps', this)">Premium Apps</div>
        <div class="chip" onclick="filterCat('Video Editing', this)">Video</div>
    </div>
    <div class="store-grid" id="appsGrid"></div>
</section>

<!-- EARN SECTION (UPDATED) -->
<section id="earn" class="page" style="display:none; padding: 20px;">
    <h2>Daily Tasks</h2>
    <div style="background:var(--card); padding:20px; border-radius:20px; margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h4 id="earnTitle">Watch Ad</h4>
            <p id="earnProgress" style="font-size:12px; color:var(--muted)">Progress: 0/10 (+20.00 Coins)</p>
        </div>
        <button id="monetagBtn" onclick="watchRewardAd()" style="background:var(--accent); color:white; padding:12px 24px; border-radius:12px; border:none; font-weight:bold;">Watch</button>
    </div>
    <p id="cooldownText" style="text-align:center; margin-top:15px; font-size:12px; color:var(--gold); display:none;"></p>
</section>

<!-- PROFILE SECTION -->
<section id="profile" class="page" style="display:none; padding: 20px; text-align: center;">
    <div id="profileImageContainer">
        <img id="profilePic" src="https://ui-avatars.com/api/?name=User" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--accent); margin-bottom:10px;">
    </div>
    <h2 id="userName">User_Member</h2>
    <div style="background:var(--card); padding:30px; border-radius:25px; margin-top:20px; border:1px solid var(--glass-border);">
        <p style="font-size:12px; color:var(--muted)">TOTAL BALANCE</p>
        <h1 style="font-size:40px; margin:10px 0;" id="profBalance">0.0000</h1>
        <button style="width:100%; padding:15px; background:white; color:black; border-radius:15px; font-weight:800; border:none;">Withdraw Now</button>
    </div>
</section>

<!-- MODALS (Game Player & Details) -->
<div id="gamePlayer">
    <div class="game-header">
        <button onclick="closeGame()" style="background:none; border:none; color:white; font-size:24px;"><i class="fa-solid fa-xmark"></i></button>
        <div style="color:var(--gold); font-weight:800;">Earned: <span id="sessionCoins">0.0000</span></div>
        <div style="width:35px"></div>
    </div>
    <iframe id="gameIframe" class="game-frame"></iframe>
</div>

<div id="detailModal" class="fs-modal">
    <div style="padding:15px; display:flex; align-items:center; gap:15px; border-bottom:1px solid var(--glass-border);">
        <i class="fa-solid fa-chevron-left" onclick="closeDetail()" style="font-size:20px;"></i>
        <span style="font-weight:800">App Details</span>
    </div>
    <div style="padding:20px;">
        <img id="detailImg" src="" style="width:100%; border-radius:24px; height:200px; object-fit:cover;">
        <h2 id="detailTitle" style="margin-top:20px;"></h2>
        <p id="detailDesc" style="color:var(--muted); margin-top:10px; font-size:14px;"></p>
        <button id="mainBtn" style="width:100%; padding:18px; border-radius:18px; border:none; font-weight:800; margin-top:30px; background:var(--primary-grad); color:white;">Download Now</button>
    </div>
</div>

<nav>
  <div class="nav-item active" onclick="showPage('home', this)"><i class="fa-solid fa-house"></i><span>Home</span></div>
  <div class="nav-item" onclick="showPage('earn', this)"><i class="fa-solid fa-circle-dollar-to-slot"></i><span>Earn</span></div>
  <div class="nav-item" onclick="showPage('profile', this)"><i class="fa-solid fa-user"></i><span>Profile</span></div>
</nav>

<script>
// --- CONFIG & SDKs ---
const SUPABASE_URL = "https://ubjfirquvrvughaxneyo.supabase.co";  
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViamZpcnF1dnJ2dWdoYXhuZXlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MTMxOTYsImV4cCI6MjA4NTA4OTE5Nn0.T9wxE4vFLGQC-_gv_50fixnbAiHIvqHe40f0txuCyrQ";   
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);  
const adsgram = window.Adsgram ? window.Adsgram.init({ blockId: "int-24524" }) : null;

let APP_DATA = [];
let balance = 0.0000;
let gameTimer = null;
let currentSessionEarned = 0;

window.onload = async () => {
    initTelegram();
    await fetchApps();
    updateEarnUI();
    setTimeout(() => document.getElementById('loadingOverlay').style.display='none', 1000);
}

function initTelegram() {
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    if(tg.initDataUnsafe?.user) {
        document.getElementById('userName').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('profilePic').src = tg.initDataUnsafe.user.photo_url || `https://ui-avatars.com/api/?name=${tg.initDataUnsafe.user.first_name}`;
    }
}

// 🛑 1. MONETAG EARN LOGIC (10 Ads = 20 Coins, 4 Hour Cooldown)
async function watchRewardAd() {
    const lastClaim = localStorage.getItem('last_reward_claim');
    const COOLDOWN_TIME = 4 * 60 * 60 * 1000; // 4 Hours

    if (lastClaim && (Date.now() - lastClaim < COOLDOWN_TIME)) {
        alert("Wait for the 4-hour cooldown to finish!");
        return;
    }

    try {
        if (typeof show_10693042 === 'function') {
            await show_10693042();
            let count = parseInt(localStorage.getItem('monetag_ad_count') || 0);
            count++;

            if (count >= 10) {
                balance += 20.00;
                localStorage.setItem('monetag_ad_count', 0);
                localStorage.setItem('last_reward_claim', Date.now());
                alert("🎉 Congratulations! 20.00 Coins added to your balance!");
            } else {
                localStorage.setItem('monetag_ad_count', count);
                alert(`Ad watched! Progress: ${count}/10`);
            }
            updateEarnUI();
            updateBalance();
        }
    } catch(e) { alert("Ad failed to load."); }
}

function updateEarnUI() {
    const count = localStorage.getItem('monetag_ad_count') || 0;
    const lastClaim = localStorage.getItem('last_reward_claim');
    const btn = document.getElementById('monetagBtn');
    const progressText = document.getElementById('earnProgress');
    const cooldownText = document.getElementById('cooldownText');

    progressText.innerText = `Progress: ${count}/10 (+20.00 Coins)`;

    if (lastClaim && (Date.now() - lastClaim < 4 * 60 * 60 * 1000)) {
        btn.disabled = true;
        btn.style.background = "#333";
        cooldownText.style.display = "block";
        const remaining = (4 - (Date.now() - lastClaim) / (60 * 60 * 1000)).toFixed(1);
        cooldownText.innerText = `Available in ${remaining} hours`;
    } else {
        btn.disabled = false;
        btn.style.background = "var(--accent)";
        cooldownText.style.display = "none";
    }
}

// 🛑 2. CATEGORY FILTERING LOGIC
function filterCat(cat, el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');

    let filtered = [];
    if(cat === 'All') {
        filtered = APP_DATA;
    } else if(cat === 'Games') {
        filtered = APP_DATA.filter(a => a.type === 'game');
    } else if(cat === 'Premium Apps') {
        filtered = APP_DATA.filter(a => a.type !== 'game' && !a.cat.toLowerCase().includes('video'));
    } else if(cat === 'Video') {
        filtered = APP_DATA.filter(a => a.cat.toLowerCase().includes('video'));
    }
    renderApps(filtered);
}

// Navigation & Data
function showPage(id, el) {
    try { if(window.TelegramAdsController) window.TelegramAdsController.show(); } catch(e) {}
    document.getElementById('home').style.display = 'none';
    document.getElementById('earn').style.display = 'none';
    document.getElementById('profile').style.display = 'none';
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(el) el.classList.add('active');
}

async function fetchApps() {
    const { data } = await sb.from('user_ads').select('*').order('created_at', {ascending: false});
    if(data) {
        APP_DATA = data.map(item => {
            const p = item.text.split('|||');
            return { id: item.id, title: p[0], desc: p[1], link: p[2], cat: p[3]||'', type: p[4]||'app', img: item.link, ad_code: item.ad_code };
        });
        renderApps(APP_DATA);
    }
}

function renderApps(apps) {
    const grid = document.getElementById('appsGrid');
    grid.innerHTML = apps.map(app => `
        <div class="app-card" onclick="handleItemClick('${app.id}')">
            ${app.type==='game' ? '<div class="badge-game">PLAY & EARN</div>' : ''}
            <img class="app-icon" src="${app.img}">
            <div class="app-title">${app.title}</div>
            <div style="font-size:11px; color:var(--success); font-weight:800;">PREMIUM</div>
        </div>
    `).join('');
}

async function handleItemClick(id) {
    const item = APP_DATA.find(x => x.id == id);
    if (item.type === 'game') {
        try { if(adsgram) await adsgram.show(); launchGame(id); } catch (e) { launchGame(id); }
    } else { openDetail(id); }
}

function launchGame(id) {
    const app = APP_DATA.find(a => a.id == id);
    document.getElementById('gameIframe').srcdoc = app.ad_code.split('|||ADMIN_CODE|||')[0];
    document.getElementById('gamePlayer').style.display = 'flex';
    currentSessionEarned = 0;
    gameTimer = setInterval(() => {
        currentSessionEarned += 0.0089;
        document.getElementById('sessionCoins').innerText = currentSessionEarned.toFixed(4);
    }, 1000);
}

function closeGame() {
    clearInterval(gameTimer);
    balance += currentSessionEarned; updateBalance();
    document.getElementById('gameIframe').srcdoc = "";
    document.getElementById('gamePlayer').style.display = 'none';
}

function openDetail(id) {
    const app = APP_DATA.find(a => a.id == id);
    document.getElementById('detailTitle').innerText = app.title;
    document.getElementById('detailImg').src = app.img;
    document.getElementById('detailDesc').innerText = app.desc;
    document.getElementById('mainBtn').onclick = () => window.open(app.link, '_blank');
    document.getElementById('detailModal').style.display = 'flex';
}
function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }
function updateBalance() {
    document.getElementById('coinDisplay').innerText = balance.toFixed(4);
    document.getElementById('profBalance').innerText = balance.toFixed(4);
}
</script>
</body>
</html>
